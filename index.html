<!-- Google tag (gtag.js) -->
<!-- Load GA only in production (not on localhost/127.0.0.1) and defer to after window.load -->
<script>
  (function() {
    const host = location.hostname;
    const isLocal = host === 'localhost' || host === '127.0.0.1';
    if (!isLocal) {
      window.addEventListener('load', function() {
        const s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-WC1M7X9STR';
        document.head.appendChild(s);

        window.dataLayer = window.dataLayer || [];
        function gtag(){window.dataLayer.push(arguments);} 
        window.gtag = gtag;
        gtag('js', new Date());
        // Consent Mode v2: default denied until CMP updates
        gtag('consent', 'default', {
          ad_storage: 'denied',
          analytics_storage: 'denied',
          ad_user_data: 'denied',
          ad_personalization: 'denied',
          wait_for_update: 500
        });
        // Helper to be called by CMP to update consent state
        window.updateConsent = function(params) { gtag('consent', 'update', params); };
        gtag('config', 'G-WC1M7X9STR', { anonymize_ip: true });
      });
    }
  })();
  </script>
    <!-- Google AdSense - load only in production and when client is configured -->
    <script>
      (function() {
        const host = location.hostname;
        const isLocal = host === 'localhost' || host === '127.0.0.1';
        // Read client from meta tag to avoid hardcoding in source
        var meta = document.querySelector('meta[name="google-adsense-account"]');
        var client = meta ? meta.getAttribute('content') : '';
        if (!isLocal && client && client.startsWith('ca-pub-')) {
          const s = document.createElement('script');
          s.async = true;
          s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + client;
          s.crossOrigin = 'anonymous';
          document.head.appendChild(s);
        }
      })();
    </script>
